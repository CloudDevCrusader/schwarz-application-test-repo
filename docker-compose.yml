version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ktor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-library}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - ktor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-library}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ktor-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ktor-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database configuration
      DATABASE_EMBEDDED: ${DATABASE_EMBEDDED:-false}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-library}
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production-min-256-bits-long}
      JWT_ISSUER: ${JWT_ISSUER:-library-application}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-library-users}
      JWT_VALIDITY: ${JWT_VALIDITY:-3600000}
      
      # Server configuration
      KTOR_PORT: ${KTOR_PORT:-8080}
      KTOR_ENV: ${KTOR_ENV:-production}
      
      # Java options
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}
    ports:
      - "${KTOR_PORT:-8080}:8080"
    networks:
      - ktor-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  ktor-network:
    driver: bridge
