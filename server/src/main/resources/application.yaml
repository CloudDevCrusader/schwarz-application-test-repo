ktor:
  deployment:
    port: 8080
  application:
    modules:
      - com.schwarzdigital.HttpKt.configureHttp
      - com.schwarzdigital.SerializationKt.configureSerialization
      - com.schwarzdigital.StatusPagesKt.configureStatusPages
      - com.schwarzdigital.auth.AuthConfigKt.configureAuth
      - com.schwarzdigital.DatabaseKt.configureDatabase
      - com.schwarzdigital.RoutingKt.configureRouting

database:
  embedded: false
  url: "jdbc:postgresql://localhost:5432/library"
  user: "postgres"
  password: "postgres"

jwt:
  secret: "your-secret-key-change-in-production-min-256-bits-long"
  issuer: "library-application"
  audience: "library-users"
  validity: "3600000"
